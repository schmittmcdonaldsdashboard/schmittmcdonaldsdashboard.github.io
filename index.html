<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schmitt Management — Shift Manager Scorecards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --surface3: #2d333b;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #cdd9e5;
  --muted:    #768390;
  --green:    #3fb950;
  --yellow:   #d29922;
  --red:      #f85149;
  --blue:     #388bfd;
  --teal:     #39d353;
  --mono:     'DM Mono', monospace;
  --sans:     'DM Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;position:sticky;top:0;z-index:200;
}
.header-logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.header-logo span{color:var(--text);}
.header-right{display:flex;gap:10px;align-items:center;}

/* SIDEBAR + LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px);}
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:20px 0;
  position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;
}
.sidebar-section{padding:0 12px;margin-bottom:24px;}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:8px;}
.sidebar-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all 0.15s;
  border:1px solid transparent;
}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.sidebar-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.main{flex:1;padding:24px 28px;overflow-x:hidden;}

/* DATE RANGE BAR */
.date-range-bar{
  display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;
}
.preset-btns{
  display:flex;gap:4px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:4px;
}
.period-btn{
  padding:6px 14px;border-radius:5px;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  color:var(--muted);transition:all 0.15s;
  font-family:var(--mono);
}
.period-btn:hover{color:var(--text);}
.period-btn.active{background:var(--surface3);color:var(--text);}
.date-range-inputs{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;
}
.date-input-wrap{display:flex;align-items:center;gap:6px;}
.date-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);}
.date-input{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:5px;padding:4px 8px;
  font-family:var(--mono);font-size:12px;color:var(--text);
  cursor:pointer;outline:none;
  color-scheme:dark;
}
.date-input:focus{border-color:var(--blue);}
.date-range-sep{color:var(--muted);font-family:var(--mono);font-size:12px;}

/* PAGE TITLE */
.page-title{
  display:flex;align-items:baseline;gap:12px;margin-bottom:20px;
}
.page-title h1{font-size:20px;font-weight:700;color:var(--text);}
.page-title .sub{font-size:13px;color:var(--muted);font-family:var(--mono);}

/* STORE SUMMARY PILLS */
.store-summary{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;
}
.summary-pill{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:10px 16px;
  display:flex;flex-direction:column;gap:2px;
  min-width:120px;
}
.pill-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.pill-value{font-family:var(--mono);font-size:20px;font-weight:500;}
.pill-value.green{color:var(--green);}
.pill-value.yellow{color:var(--yellow);}
.pill-value.red{color:var(--red);}
.pill-sub{font-size:11px;color:var(--muted);}

/* MANAGER GRID */
.manager-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:14px;
}

/* MANAGER CARD */
.manager-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  transition:border-color 0.2s,transform 0.2s;
  cursor:pointer;
}
.manager-card:hover{border-color:var(--border2);transform:translateY(-2px);}

.card-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.card-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;}
.card-meta{font-size:11px;color:var(--muted);font-family:var(--mono);}
.card-score{
  font-family:var(--mono);font-size:22px;font-weight:500;
  line-height:1;text-align:right;
}
.card-score-label{font-size:10px;color:var(--muted);text-align:right;margin-top:2px;}

/* METRIC ROWS */
.card-metrics{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.metric-row{display:flex;align-items:center;gap:10px;}
.metric-name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);width:72px;flex-shrink:0;}
.metric-bar-wrap{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.metric-bar{height:100%;border-radius:3px;transition:width 0.6s ease;}
.metric-bar.green{background:var(--green);}
.metric-bar.yellow{background:var(--yellow);}
.metric-bar.red{background:var(--red);}
.metric-val{font-family:var(--mono);font-size:12px;font-weight:500;width:52px;text-align:right;flex-shrink:0;}
.metric-val.green{color:var(--green);}
.metric-val.yellow{color:var(--yellow);}
.metric-val.red{color:var(--red);}
.metric-trend{font-size:10px;width:20px;text-align:center;flex-shrink:0;}

/* PRESHIFT */
.preshift-row{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px;
  border-top:1px solid var(--border);
  background:var(--surface2);
}
.preshift-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1;}
.preshift-pips{display:flex;gap:4px;}
.pip{width:12px;height:12px;border-radius:2px;flex-shrink:0;}
.pip.green{background:var(--green);}
.pip.yellow{background:var(--yellow);}
.pip.red{background:var(--red);}
.pip.empty{background:var(--surface3);}
.preshift-stat{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:8px;}

/* CARD FOOTER */
.card-footer{
  padding:8px 16px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.shift-count{font-size:11px;color:var(--muted);font-family:var(--mono);}
.view-link{font-size:11px;color:var(--blue);cursor:pointer;}
.view-link:hover{text-decoration:underline;}

/* DETAIL PANEL */
.detail-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;
  backdrop-filter:blur(4px);align-items:flex-start;justify-content:flex-end;
}
.detail-overlay.open{display:flex;}
.detail-panel{
  width:520px;max-width:95vw;height:100vh;
  background:var(--surface);border-left:1px solid var(--border2);
  overflow-y:auto;padding:28px;
  animation:slideIn 0.25s ease;
}
@keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.panel-close{
  position:absolute;top:20px;right:24px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);width:30px;height:30px;border-radius:6px;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:color 0.15s;
}
.panel-close:hover{color:var(--text);}
.panel-name{font-size:22px;font-weight:700;margin-bottom:4px;}
.panel-meta{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:24px;}
.panel-section{margin-bottom:24px;}
.panel-section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* SHIFT HISTORY TABLE */
.history-table{width:100%;border-collapse:collapse;}
.history-table th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);}
.history-table td{padding:8px;font-size:13px;border-bottom:1px solid var(--border);font-family:var(--mono);}
.history-table tr:last-child td{border-bottom:none;}
.history-table tr:hover td{background:var(--surface2);}
.td-name{font-family:var(--sans);font-weight:500;color:var(--text);}

/* SPARKLINE */
.sparkline-wrap{display:flex;gap:2px;align-items:flex-end;height:32px;margin-top:6px;}
.spark-bar{width:14px;border-radius:2px 2px 0 0;transition:height 0.4s ease;}

/* SCORE COLOR */
.score-a{color:var(--green);}
.score-b{color:#7ee787;}
.score-c{color:var(--yellow);}
.score-d{color:#e3b341;}
.score-f{color:var(--red);}

/* SOURCE BADGES */
.source-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;font-family:var(--mono);
}
.source-badge.qsr{background:rgba(56,139,253,0.15);color:var(--blue);border:1px solid rgba(56,139,253,0.3);}
.source-badge.jolt{background:rgba(63,185,80,0.12);color:var(--green);border:1px solid rgba(63,185,80,0.25);}
.source-divider{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;
  background:var(--bg);
  border-top:1px solid var(--border);
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);font-family:var(--mono);
}
.source-divider .line{flex:1;height:1px;background:var(--border);}
.jolt-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:rgba(63,185,80,0.04);
}
.jolt-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);width:72px;flex-shrink:0;}
.jolt-bar-wrap{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-msg{font-size:14px;}

/* RESPONSIVE */
/* ── MOBILE BOTTOM NAV ── */
.mobile-store-nav {
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:250;
  background:var(--surface);border-top:1px solid var(--border2);
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.mobile-store-nav::-webkit-scrollbar{display:none;}
.mobile-store-nav-inner{
  display:flex;gap:2px;padding:6px 8px;
  min-width:max-content;
}
.mobile-store-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:8px;
  font-size:10px;font-weight:700;letter-spacing:0.5px;
  color:var(--muted);cursor:pointer;transition:all 0.15s;
  white-space:nowrap;min-width:64px;
  border:1px solid transparent;
}
.mobile-store-btn.active{
  background:var(--surface2);color:var(--text);border-color:var(--border2);
}
.mobile-store-btn .dot{width:6px;height:6px;border-radius:50%;}
.mobile-store-btn .score{font-family:var(--mono);font-size:12px;font-weight:600;}

@media(max-width:768px){
  /* Layout */
  .sidebar{display:none;}
  .mobile-store-nav{display:block;}
  .main{padding:12px 12px 80px;}
  .layout{min-height:calc(100vh - 56px);}

  /* Header */
  .header{padding:0 14px;height:50px;}
  .header-logo{font-size:11px;}

  /* Date range bar */
  .date-range-bar{gap:8px;margin-bottom:16px;}
  .preset-btns{gap:2px;padding:3px;}
  .period-btn{padding:5px 10px;font-size:11px;}
  .date-range-inputs{padding:5px 10px;gap:6px;flex-wrap:wrap;}
  .date-label{font-size:9px;}
  .date-input{font-size:11px;padding:3px 6px;}

  /* Page title */
  .page-title{margin-bottom:14px;flex-wrap:wrap;gap:6px;}
  .page-title h1{font-size:17px;}
  .page-title .sub{font-size:11px;}

  /* Store summary pills — horizontal scroll */
  .store-summary{
    flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;padding-bottom:4px;margin-bottom:20px;
  }
  .store-summary::-webkit-scrollbar{display:none;}
  .summary-pill{min-width:100px;flex-shrink:0;padding:8px 12px;}
  .pill-value{font-size:17px;}
  .pill-label{font-size:9px;}
  .pill-sub{font-size:10px;}

  /* Manager grid */
  .manager-grid{grid-template-columns:1fr;gap:10px;}

  /* Manager cards */
  .card-name{font-size:14px;}
  .card-score{font-size:20px;}
  .card-metrics{padding:10px 14px;gap:8px;}
  .metric-name{font-size:10px;width:62px;}
  .metric-val{font-size:11px;width:46px;}

  /* Detail panel — full screen on mobile */
  .detail-panel{
    width:100vw;max-width:100vw;
    border-left:none;
    padding:20px 16px 40px;
  }
  .panel-close{top:14px;right:14px;}
  .panel-name{font-size:18px;}
  .panel-meta{font-size:11px;margin-bottom:18px;}
  .history-table td{padding:6px 6px;font-size:11px;}
  .history-table th{padding:5px 6px;font-size:9px;}

  /* Summary grid in panel — 2 cols on mobile */
  #panelContent .summary-pill{padding:8px 10px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Schmitt <span>Management</span> · Shift Scorecards</div>
  <div class="header-right">
    <span style="font-size:12px;color:var(--muted);font-family:var(--mono);" id="headerPeriod"></span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Stores</div>
      <div id="storeNav"></div>
    </div>
  </div>

  <div class="main">
    <div class="date-range-bar">
      <div class="preset-btns">
        <div class="period-btn active" onclick="setPreset('week',this)">7D</div>
        <div class="period-btn" onclick="setPreset('month',this)">MTD</div>
        <div class="period-btn" onclick="setPreset('lastmonth',this)">LM</div>
        <div class="period-btn" onclick="setPreset('quarter',this)">QTD</div>
        <div class="period-btn" onclick="setPreset('year',this)">YTD</div>
        <div class="period-btn" onclick="setPreset('all',this)">All</div>
      </div>
      <div class="date-range-inputs">
        <div class="date-input-wrap">
          <label class="date-label">From</label>
          <input type="date" id="dateFrom" class="date-input" onchange="setCustomRange()">
        </div>
        <div class="date-range-sep">→</div>
        <div class="date-input-wrap">
          <label class="date-label">To</label>
          <input type="date" id="dateTo" class="date-input" onchange="setCustomRange()">
        </div>
      </div>
    </div>

    <div class="page-title">
      <h1 id="pageTitle">Fox Valley</h1>
      <div class="sub" id="pageSubtitle">#4513 · Naperville</div>
    </div>

    <div class="store-summary" id="storeSummary"></div>
    <div class="manager-grid" id="managerGrid"></div>
  </div>
</div>

<!-- MOBILE BOTTOM STORE NAV -->
<div class="mobile-store-nav">
  <div class="mobile-store-nav-inner" id="mobileStoreNav"></div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closePanel(event)">
  <div class="detail-panel" id="detailPanel">
    <button class="panel-close" onclick="closeDetail()">×</button>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-meta" id="panelMeta"></div>
    <div id="panelContent"></div>
  </div>
</div>

// ============================================================
// TRUE LABOR LOOKUP
// Returns accurate store-level labor % for a given date range
// Falls back to sales-weighted avg of shift data if not available
// ============================================================
function getTrueLaborForStore(storeId, fromDate, toDate) {
  // Collect all months in range
  const from = new Date(fromDate), to = new Date(toDate);
  const months = [];
  let d = new Date(from.getFullYear(), from.getMonth(), 1);
  while (d <= to) {
    months.push({ year: d.getFullYear(), month: d.getMonth() + 1 });
    d.setMonth(d.getMonth() + 1);
  }

  // If single month or all months have truth data, use weighted avg of truth
  let totalLaborDollars = 0, totalSales = 0, allFound = true;
  for (const { year, month } of months) {
    const key = `${storeId}_${year}_${String(month).padStart(2,'0')}`;
    const truth = LABOR_TRUTH[key];
    if (truth && truth.sales) {
      const laborDollars = (truth.labor_pct / 100) * truth.sales;
      totalLaborDollars += laborDollars;
      totalSales += truth.sales;
    } else {
      allFound = false;
      break;
    }
  }
  if (allFound && totalSales > 0) {
    return { pct: Math.round((totalLaborDollars / totalSales) * 1000) / 10, source: 'actual' };
  }

  // Fallback: sales-weighted avg from shift data (March xlsx has sales)
  const shifts = RAW.filter(s => s.store === storeId && s.date >= fromDate && s.date <= toDate && s.sales);
  if (shifts.length > 0) {
    const wLabor = shifts.reduce((a, s) => a + (s.labor / 100) * s.sales, 0);
    const wSales = shifts.reduce((a, s) => a + s.sales, 0);
    return { pct: Math.round((wLabor / wSales) * 1000) / 10, source: 'weighted' };
  }

  // Last fallback: simple average
  const allShifts = RAW.filter(s => s.store === storeId && s.date >= fromDate && s.date <= toDate);
  if (allShifts.length > 0) {
    const avg = allShifts.reduce((a, s) => a + s.labor, 0) / allShifts.length;
    return { pct: Math.round(avg * 10) / 10, source: 'avg' };
  }
  return null;
}


// ============================================================
// SCORING ENGINE
// ============================================================

function scoreOEPE(v, shift) {
  const t = getT(shift).oepe;
  if (v <= t.good) return 100;
  if (v <= t.warn) return Math.round(100 - ((v - t.good) / (t.warn - t.good)) * 40);
  return Math.max(0, Math.round(60 - ((v - t.warn) / (t.warn * 0.4)) * 60));
}
function scoreLabor(v, shift) {
  const t = getT(shift).labor;
  if (v <= t.good) return 100;
  if (v <= t.warn) return Math.round(100 - ((v - t.good) / (t.warn - t.good)) * 40);
  return Math.max(0, Math.round(60 - ((v - t.warn) / (t.warn * 0.4)) * 60));
}
function scorePreshift(v) {
  if (v === 'unknown') return null;
  return v === 'complete' ? 100 : v === 'late' ? 60 : 0;
}
function scoreJolt(v) {
  if (v >= 95) return 100;
  if (v >= 80) return Math.round(100 - ((95 - v) / 15) * 20);
  if (v >= 60) return Math.round(80 - ((80 - v) / 20) * 30);
  return Math.max(0, Math.round(50 - ((60 - v) / 60) * 50));
}
function calcShiftScore(s) {
  const ps = scorePreshift(s.preshift);
  const oScore = scoreOEPE(s.oepe, s.shift);
  const lScore = scoreLabor(s.labor, s.shift);
  // Closing and Overnight have no pre-shift checklist — score on OEPE + Labor only
  const noPreshift = (s.shift === 'Closing' || s.shift === 'Overnight');
  if (noPreshift) {
    return Math.round((oScore*0.50)+(lScore*0.50));
  }
  if (s.joltChecklist !== null && s.joltChecklist !== undefined) {
    const psW = ps === null ? 0 : 0.15;
    const jW = 0.15;
    const base = 1 - psW - jW;
    const half = base / 2;
    return Math.round((oScore*half)+(lScore*half)+(ps===null?0:ps*psW)+(scoreJolt(s.joltChecklist)*jW));
  }
  if (ps === null) return Math.round((oScore*0.50)+(lScore*0.50));
  return Math.round((oScore*0.40)+(lScore*0.40)+(ps*0.20));
}
function gradeColor(score) {
  if (score >= 90) return 'green';
  if (score >= 75) return 'score-b';
  if (score >= 60) return 'yellow';
  if (score >= 45) return 'score-d';
  return 'red';
}
function gradeLabel(score) {
  if (score >= 90) return 'A';
  if (score >= 75) return 'B';
  if (score >= 60) return 'C';
  if (score >= 45) return 'D';
  return 'F';
}
function metricColor(val, type, shift) {
  const t = getT(shift || 'Morning');
  if (type === 'oepe')  return val <= t.oepe.good  ? 'green' : val <= t.oepe.warn  ? 'yellow' : 'red';
  if (type === 'labor') return val <= t.labor.good ? 'green' : val <= t.labor.warn ? 'yellow' : 'red';
  if (type === 'jolt')  return val >= 95 ? 'green' : val >= 75 ? 'yellow' : 'red';
  return val === 'complete' ? 'green' : val === 'late' ? 'yellow' : 'red';
}

// FILTER BY PERIOD
// ============================================================

let currentStore = '4513';

// Date range state
const REF_DATE = (() => {
  // Always use the latest date available in the dataset
  const dates = RAW.map(s => s.date);
  return dates.reduce((a, b) => a > b ? a : b);
})();
let rangeFrom = null;
let rangeTo   = null;

function getDataDateRange() {
  const dates = RAW.map(s => s.date).sort();
  return { min: dates[0], max: dates[dates.length - 1] };
}

function setPreset(preset, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const ref = new Date(REF_DATE);
  if (preset === 'week') {
    const from = new Date(ref); from.setDate(ref.getDate() - 6);
    rangeFrom = from.toISOString().slice(0,10);
    rangeTo   = REF_DATE;
  } else if (preset === 'month') {
    rangeFrom = `${ref.getFullYear()}-${String(ref.getMonth()+1).padStart(2,'0')}-01`;
    rangeTo   = REF_DATE;
  } else if (preset === 'lastmonth') {
    const lmYear  = ref.getMonth() === 0 ? ref.getFullYear() - 1 : ref.getFullYear();
    const lmMonth = ref.getMonth() === 0 ? 12 : ref.getMonth();
    const lmDays  = new Date(lmYear, lmMonth, 0).getDate();
    rangeFrom = `${lmYear}-${String(lmMonth).padStart(2,'0')}-01`;
    rangeTo   = `${lmYear}-${String(lmMonth).padStart(2,'0')}-${String(lmDays).padStart(2,'0')}`;
  } else if (preset === 'quarter') {
    const qMonth = Math.floor(ref.getMonth()/3)*3;
    rangeFrom = `${ref.getFullYear()}-${String(qMonth+1).padStart(2,'0')}-01`;
    rangeTo   = REF_DATE;
  } else if (preset === 'year') {
    rangeFrom = `${ref.getFullYear()}-01-01`;
    rangeTo   = REF_DATE;
  } else if (preset === 'all') {
    const dr = getDataDateRange();
    rangeFrom = dr.min;
    rangeTo   = dr.max;
  }
  syncDateInputs();
  renderGrid();
}

function setCustomRange() {
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  if (!from || !to) return;
  rangeFrom = from;
  rangeTo   = to <= REF_DATE ? to : REF_DATE;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  renderGrid();
}

function syncDateInputs() {
  document.getElementById('dateFrom').value = rangeFrom || '';
  document.getElementById('dateTo').value   = rangeTo   || '';
}

function filterByPeriod(data) {
  return data.filter(s => s.date >= rangeFrom && s.date <= rangeTo);
}

function periodLabel() {
  if (!rangeFrom || !rangeTo) return '';
  const fmt = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return rangeFrom === rangeTo ? fmt(rangeFrom) : `${fmt(rangeFrom)} – ${fmt(rangeTo)}`;
}

// Init default range: last 7 days
(function initRange() {
  const ref = new Date(REF_DATE);
  const from = new Date(ref); from.setDate(ref.getDate() - 6);
  rangeFrom = from.toISOString().slice(0,10);
  rangeTo   = REF_DATE;
})();

// ============================================================
// AGGREGATE MANAGER STATS
// ============================================================

function aggregateManagers(data) {
  const byManager = {};
  data.forEach(s => {
    if (!byManager[s.manager]) byManager[s.manager] = { name:s.manager, store:s.store, shifts:[] };
    byManager[s.manager].shifts.push(s);
  });

  return Object.values(byManager).map(m => {
    const shifts = m.shifts;
    const n = shifts.length;
    const avgOepe  = Math.round(shifts.reduce((a,s)=>a+s.oepe,0)/n);
    const avgLabor = Math.round(shifts.reduce((a,s)=>a+s.labor,0)/n * 10) / 10;
    const preshiftCounts = { complete:0, late:0, incomplete:0, unknown:0 };
    shifts.forEach(s => { if (preshiftCounts[s.preshift] !== undefined) preshiftCounts[s.preshift]++; });
    const knownPS = n - preshiftCounts.unknown;
    const preshiftRate = knownPS > 0 ? Math.round(preshiftCounts.complete / knownPS * 100) : null;
    const avgScore = Math.round(shifts.reduce((a,s)=>a+calcShiftScore(s),0)/n);
    const avgJolt = null; // Jolt checklist % — pending Jolt API integration

    // Daily breakdown for sparkline
    const byDate = {};
    shifts.forEach(s => {
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push(calcShiftScore(s));
    });
    const dailyScores = Object.keys(byDate).sort().map(d => Math.round(byDate[d].reduce((a,v)=>a+v,0)/byDate[d].length));

    return { ...m, n, avgOepe, avgLabor, preshiftCounts, preshiftRate, avgScore, dailyScores };
  }).sort((a,b) => b.avgScore - a.avgScore);
}

function renderGrid() {
  const storeData = RAW.filter(s => s.store === currentStore);

}

  nav.innerHTML = Object.entries(STORES).map(([id, store]) => {
    const active = id === currentStore ? 'active' : '';
    const data = filterByPeriod(RAW.filter(s => s.store === id));
    const avg = data.length ? Math.round(data.reduce((a,s) => a + calcShiftScore(s), 0) / data.length) : null;
    const col = avg === null ? 'var(--muted)' : avg >= 75 ? 'var(--green)' : avg >= 55 ? 'var(--yellow)' : 'var(--red)';
    const scoreDisplay = avg !== null ? avg : '—';
    return `<div class="sidebar-item ${active}" onclick="selectStore('${id}')">
      <div class="dot" style="background:${col}"></div>
      <div style="flex:1">
        <div style="font-size:12px;color:var(--text);font-weight:500">${store.name}</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">#${id}</div>
      </div>
      <div style="font-family:var(--mono);font-size:11px;color:${col};font-weight:600;margin-left:6px">${scoreDisplay}</div>
    </div>`;
  }).join('');
  renderMobileStoreNav();
}

function selectStore(id) {
  currentStore = id;
  document.getElementById('pageTitle').textContent    = STORES[id].name;
  document.getElementById('pageSubtitle').textContent = `#${id} · ${STORES[id].location}`;
  renderStoreNav();
  renderMobileStoreNav();
  renderGrid();
}

// Period control handled by setPreset() and setCustomRange()

// ============================================================
// BOOT
// ============================================================

renderStoreNav();
renderMobileStoreNav();
renderGrid();
</script>
</body>
</html>
